<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Icono casa minimalista -->
  <g transform="translate(0, 8)">
    <!-- Techo -->
    <polyline points="20,38 36,22 52,38" fill="none" stroke="#0A0A0A" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Puerta -->
    <rect x="30" y="48" width="12" height="16" fill="none" stroke="#0A0A0A" stroke-width="2" rx="1"/>
    <!-- Cuerpo casa -->
    <polyline points="22,38 22,64 50,64 50,38" fill="none" stroke="#0A0A0A" stroke-width="2" stroke-linejoin="round"/>
    <!-- Columna izquierda (detalle premium) -->
    <line x1="25" y1="40" x2="25" y2="64" stroke="#0A0A0A" stroke-width="1.2"/>
    <line x1="47" y1="40" x2="47" y2="64" stroke="#0A0A0A" stroke-width="1.2"/>
  </g>

  <!-- Texto principal -->
  <text x="68" y="45" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#0A0A0A" letter-spacing="3">SOLUCIONES</text>
  <text x="68" y="70" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#0A0A0A" letter-spacing="2">INMOBILIARIAS RD</text>

  <!-- Línea divisoria -->
  <line x1="68" y1="78" x2="310" y2="78" stroke="#0A0A0A" stroke-width="1"/>
</svg>
